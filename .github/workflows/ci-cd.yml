name: CI and Deploy

on:
   push:
      branches: [main]
   pull_request:
      branches: [main]

jobs:
   test:
      runs-on: ubuntu-latest
      steps:
         - uses: actions/checkout@v4
         - name: Use Node.js
           uses: actions/setup-node@v4
           with:
              node-version: "20"
         - name: Install dependencies
           run: npm ci
         - name: Run tests
           run: npm test

   build-and-push:
      needs: test
      runs-on: ubuntu-latest
      steps:
         - uses: actions/checkout@v4
         - name: Set up QEMU
           uses: docker/setup-qemu-action@v2
         - name: Set up Docker Buildx
           uses: docker/setup-buildx-action@v2
         - name: Login to Docker Hub
           uses: docker/login-action@v2
           with:
              username: ${{ secrets.DOCKERHUB_USERNAME }}
              password: ${{ secrets.DOCKERHUB_TOKEN }}
         - name: Build and push
           uses: docker/build-push-action@v4
           with:
              context: .
              push: true
              tags: |
                 ${{ secrets.DOCKERHUB_REPO }}:latest
                 ${{ secrets.DOCKERHUB_REPO }}:${{ github.sha }}

   ssh-deploy:
      if: ${{ secrets.SSH_HOST && secrets.SSH_USER && secrets.SSH_KEY }}
      needs: build-and-push
      runs-on: ubuntu-latest
      steps:
         - name: Deploy over SSH
           uses: appleboy/ssh-action@v0.1.7
           with:
              host: ${{ secrets.SSH_HOST }}
              username: ${{ secrets.SSH_USER }}
              key: ${{ secrets.SSH_KEY }}
              port: 22
              script: |
                 docker pull ${{ secrets.DOCKERHUB_REPO }}:latest
                 docker stop hydro-backend || true
                 docker rm hydro-backend || true
                 docker run -d --name hydro-backend -p 4000:4000 --env-file /path/to/.env ${{ secrets.DOCKERHUB_REPO }}:latest
